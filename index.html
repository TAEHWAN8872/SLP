<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월급 계산기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6fb; --surface: #ffffff; --surface2: #eef0f7;
      --border: #dde1ee; --accent: #6c63ff; --accent-light: #5a52e0;
      --green: #179e68; --text: #1e2133; --muted: #8a8fa8;
      --danger: #e03e3e; --yellow: #b38a00; --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; padding: 40px 16px 80px; }

    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent-light); }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.92rem; }

    /* 툴바 */
    .toolbar { max-width: 980px; margin: 0 auto 14px; display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .btn-tool { display: flex; align-items: center; gap: 6px; font-family: inherit; font-size: 0.84rem; font-weight: 600; padding: 8px 16px; border-radius: 7px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
    .btn-tool.save  { background: rgba(108,99,255,0.10); color: var(--accent-light); border-color: rgba(108,99,255,0.3); }
    .btn-tool.save:hover { background: rgba(108,99,255,0.2); }
    .btn-tool.excel { background: rgba(23,158,104,0.10); color: var(--green); border-color: rgba(23,158,104,0.3); }
    .btn-tool.excel:hover { background: rgba(23,158,104,0.2); }
    .btn-tool.reset { background: rgba(224,62,62,0.07); color: var(--danger); border-color: rgba(224,62,62,0.25); }
    .btn-tool.reset:hover { background: rgba(224,62,62,0.15); }

    /* 토스트 */
    .save-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e2133; border: 1px solid #333; color: #fff; font-size: 0.88rem; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 단가 패널 */
    .rate-panel { max-width: 980px; margin: 0 auto 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 24px; display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
    .rate-panel .panel-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; white-space: nowrap; }
    .rate-group { display: flex; align-items: center; gap: 10px; }
    .rate-label { font-size: 0.88rem; color: var(--muted); white-space: nowrap; }
    .rate-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
    .rate-badge.basic { background: rgba(23,158,104,0.12); color: var(--green); }
    .rate-badge.ot    { background: rgba(90,82,224,0.12); color: var(--accent-light); }
    .rate-input-wrap { display: flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; transition: border-color 0.2s; }
    .rate-input-wrap:focus-within { border-color: var(--accent-light); }
    .rate-input-wrap span { color: var(--muted); font-size: 0.85rem; }
    .rate-input { background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 0.95rem; font-weight: 600; width: 110px; text-align: right; outline: none; }
    .rate-input::placeholder { color: var(--muted); font-weight: 400; }
    .rate-unit { font-size: 0.78rem; color: var(--muted); margin-left: 2px; }

    /* ════════════════════════════
       PC 테이블
    ════════════════════════════ */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; max-width: 980px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2); padding: 12px 14px;
      font-size: 0.77rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
      text-align: center;           /* ← 헤더 가운데 정렬 */
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(108,99,255,0.03); }
    td { padding: 11px 14px; vertical-align: middle; text-align: center; } /* ← 셀 가운데 */

    /* 이름 */
    .input-name { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.95rem; padding: 4px 0; width: 100%; outline: none; transition: border-color 0.2s; text-align: center; }
    .input-name:focus { border-color: var(--accent-light); }
    .input-name::placeholder { color: var(--muted); }
    .input-name.dup { border-color: var(--yellow); color: var(--yellow); }
    .mobile-name-input.dup { border-color: var(--yellow); color: var(--yellow); }
    .dup-badge { font-size: 0.7rem; color: var(--yellow); font-weight: 700; margin-left: 4px; white-space: nowrap; }

    /* 플타 세그먼트 탭 (PC + 모바일 공통) */
    .seg-wrap { display: inline-flex; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; background: var(--surface2); }
    .seg-btn {
      flex: 1; padding: 6px 16px; font-family: inherit; font-size: 0.85rem; font-weight: 700;
      border: none; background: transparent; color: var(--muted); cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .seg-btn.active-basic  { background: var(--green);        color: #fff; }
    .seg-btn.active-ot     { background: var(--accent);       color: #fff; }

    /* 교육날짜 셀 – 클릭 트리거 영역 */
    .edu-cell { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .edu-trigger {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface2); transition: border-color 0.15s, background 0.15s;
      min-width: 140px; justify-content: space-between;
    }
    .edu-trigger:hover { border-color: var(--yellow); background: rgba(179,138,0,0.06); }
    .edu-trigger-inner { display: flex; flex-direction: column; gap: 2px; }
    .edu-trigger-text { font-size: 0.82rem; color: var(--muted); }
    .edu-trigger-text.has-days { color: var(--yellow); font-weight: 700; }
    .edu-trigger-dates { font-size: 0.72rem; color: var(--muted); line-height: 1.3; word-break: break-all; }
    .edu-trigger-icon { font-size: 0.85rem; opacity: .5; flex-shrink: 0; }

    /* 팝업 달력 오버레이 */
    .cal-popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .cal-popup-overlay.show { display: flex; }
    .cal-popup {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; width: min(360px, 92vw);
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    }
    /* 달력 헤더 – 연/월 + 이전/다음 */
    .cal-popup-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-popup-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .cal-popup-title span { color: var(--accent-light); }
    .cal-nav-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.95rem; width: 30px; height: 30px;
      border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: rgba(108,99,255,0.1); border-color: var(--accent-light); }
    /* 요일 헤더 */
    .cal-dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px;
    }
    .cal-dow { font-size: 0.68rem; font-weight: 700; color: var(--muted);
      text-align: center; padding: 2px 0; text-transform: uppercase; }
    .cal-dow:first-child { color: #e04040; }
    .cal-dow:last-child  { color: var(--accent-light); }
    /* 날짜 그리드 */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 0.8rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; justify-content: center;
      padding: 0; width: 100%;
    }
    .cal-day:hover { border-color: var(--yellow); background: rgba(179,138,0,0.08); }
    .cal-day.selected { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .cal-day.today { border-color: var(--accent-light); }
    .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-day.out-of-month { opacity: 0.3; }
    /* 달력 하단 */
    .cal-popup-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .cal-count-label { font-size: 0.82rem; color: var(--yellow); font-weight: 700; }
    .cal-count-label.empty { color: var(--muted); font-weight: 400; }
    .cal-footer-btns { display: flex; gap: 8px; }
    .cal-btn-clear { background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: inherit; font-size: 0.8rem; padding: 5px 12px; border-radius: 7px; cursor: pointer; }
    .cal-btn-clear:hover { color: var(--danger); border-color: rgba(224,62,62,0.4); }
    .cal-btn-done { background: var(--accent); border: none; color: #fff;
      font-family: inherit; font-size: 0.8rem; font-weight: 700;
      padding: 5px 14px; border-radius: 7px; cursor: pointer; }
    .cal-btn-done:hover { background: var(--accent-light); }

    /* 적용 단가 */
    .applied-rate { font-size: 0.85rem; white-space: nowrap; text-align: center; font-weight: 600; }
    .applied-rate.basic { color: var(--green); }
    .applied-rate.ot    { color: var(--accent-light); }
    .applied-rate.none  { color: var(--muted); }

    /* 최종 금액 */
    .result-cell { font-weight: 700; font-size: 0.98rem; color: var(--muted); white-space: nowrap; text-align: center; }
    .result-cell.has-value { color: var(--green); }
    .result-cell.ot-value  { color: var(--accent-light); }

    /* 삭제 */
    .btn-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    .btn-del:hover { color: var(--danger); background: rgba(224,62,62,0.08); }

    /* 행 추가 */
    .add-row-wrap { padding: 13px 14px; border-top: 1px solid var(--border); }
    .btn-add { background: none; border: 1px dashed var(--border); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.88rem; padding: 7px 14px; border-radius: 6px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-add:hover { border-color: var(--accent); color: var(--accent-light); background: rgba(108,99,255,0.05); }

    /* 합계 */
    .summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); max-width: 980px; margin: 16px auto 0; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .summary-left .label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
    .summary-left .sub { font-size: 0.88rem; color: var(--muted); margin-top: 4px; }
    .summary-left .sub span { color: var(--text); font-weight: 600; }
    .total-amount { font-size: 2rem; font-weight: 700; color: var(--green); letter-spacing: -1px; }
    .total-amount sup { font-size: 1rem; font-weight: 600; margin-right: 3px; vertical-align: super; }

    /* 모달 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; max-width: 340px; width: 90%; text-align: center; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .modal p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
    .modal-btns .btn-cancel { background: var(--surface2); color: var(--muted); }
    .modal-btns .btn-cancel:hover { color: var(--text); }
    .modal-btns .btn-confirm { background: rgba(224,62,62,0.1); color: var(--danger); border-color: rgba(224,62,62,0.25); }
    .modal-btns .btn-confirm:hover { background: rgba(224,62,62,0.2); }

    /* ════════════════════════════
       모바일: 카드형 레이아웃
    ════════════════════════════ */
    .mobile-list { display: none; max-width: 980px; margin: 0 auto; }
    .mobile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
    }
    .mobile-card-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .mobile-name-input {
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 1rem; font-weight: 600;
      padding: 4px 0; outline: none; flex: 1; margin-right: 12px; transition: border-color 0.2s;
    }
    .mobile-name-input:focus { border-color: var(--accent-light); }
    .mobile-name-input::placeholder { color: var(--muted); font-weight: 400; }
    .mobile-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
    .mobile-field label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
    .mobile-edu-wrap { display: flex; align-items: center; gap: 6px; }
    .mobile-edu-input {
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.93rem;
      padding: 4px 0; flex: 1; outline: none; transition: border-color 0.2s;
    }
    .mobile-edu-input:focus { border-color: var(--yellow); }
    .mobile-edu-input::placeholder { color: var(--muted); font-size: 0.82rem; }
    .mobile-field.full { grid-column: 1 / -1; }
    /* 플타 + 단가 한 줄 */
    .mobile-plta-row {
      grid-column: 1 / -1; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .mobile-plta-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .mobile-plta-rate-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .mobile-result { font-size: 1.05rem; font-weight: 700; color: var(--muted); }
    .mobile-result.has-value { color: var(--green); }
    .mobile-result.ot-value  { color: var(--accent-light); }
    .mobile-rate { font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    .mobile-rate.basic { color: var(--green); }
    .mobile-rate.ot    { color: var(--accent-light); }
    .mobile-add-btn { width: 100%; background: none; border: 1px dashed var(--border); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.88rem; padding: 12px; border-radius: var(--radius); transition: all 0.15s; margin-top: 4px; }
    .mobile-add-btn:hover { border-color: var(--accent); color: var(--accent-light); }

    @media (max-width: 680px) {
      body { padding: 24px 12px 80px; }
      header h1 { font-size: 1.5rem; }
      .card { display: none; }           /* PC 테이블 숨김 */
      .mobile-list { display: block; }   /* 모바일 카드 표시 */
      .rate-panel { gap: 14px; padding: 14px 16px; flex-direction: column; align-items: flex-start; }
      .toolbar { justify-content: stretch; }
      .btn-tool { flex: 1; justify-content: center; font-size: 0.8rem; padding: 8px 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>💰 월급 <span>계산기</span></h1>
  <p>단가를 설정하고 직원별 플타 여부와 교육 날짜를 입력하세요</p>
</header>

<!-- 툴바 -->
<div class="toolbar">
  <button class="btn-tool save"  onclick="saveData()">💾 저장</button>
  <button class="btn-tool excel" onclick="exportExcel()">📊 엑셀 내보내기</button>
  <button class="btn-tool reset" onclick="openResetModal()">🗑 초기화</button>
</div>

<!-- 단가 패널 -->
<div class="rate-panel">
  <div class="panel-title">단가 설정</div>
  <div class="rate-group">
    <div class="rate-label"><span class="rate-badge basic">기본</span>기본 단가 (회당)</div>
    <div class="rate-input-wrap">
      <span>₩</span>
      <input class="rate-input" id="rateBasic" type="text" inputmode="numeric" placeholder="0" oninput="onRateInput('basic', this.value)" />
      <span class="rate-unit">/ 회</span>
    </div>
  </div>
  <div class="rate-group">
    <div class="rate-label"><span class="rate-badge ot">플타</span>플타 단가 (회당)</div>
    <div class="rate-input-wrap">
      <span>₩</span>
      <input class="rate-input" id="rateOT" type="text" inputmode="numeric" placeholder="0" oninput="onRateInput('ot', this.value)" />
      <span class="rate-unit">/ 회</span>
    </div>
  </div>
</div>

<!-- PC 테이블 -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th style="width:12%">이름</th>
        <th style="width:8%">교육선택</th>
        <th style="width:44%">교육 날짜 <span style="font-weight:400;opacity:.5;font-size:0.72rem">(날짜 클릭으로 선택)</span></th>
        <th style="width:16%">적용 단가</th>
        <th style="width:15%">최종 금액</th>
        <th style="width:5%"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="add-row-wrap">
    <button class="btn-add" onclick="addRow()">＋ 아이 추가</button>
  </div>
</div>

<!-- 모바일 카드 리스트 -->
<div class="mobile-list" id="mobileList"></div>
<button class="mobile-add-btn" id="mobileAddBtn" style="display:none;max-width:980px;margin:0 auto;" onclick="addRow()">＋ 아이 추가</button>

<!-- 합계 -->
<div class="summary">
  <div class="summary-left">
    <div class="label">총 합계</div>
    <div class="sub">아이 <span id="empCount">0</span>명 · 플타 <span id="otCount">0</span>명 · 총 교육 <span id="eduTotal">0</span>회</div>
  </div>
  <div class="total-amount"><sup>₩</sup><span id="totalDisplay">0</span></div>
</div>

<!-- 달력 팝업 -->
<div class="cal-popup-overlay" id="calPopupOverlay" onclick="calOverlayClick(event)">
  <div class="cal-popup">
    <div class="cal-popup-header">
      <button class="cal-nav-btn" onclick="calNavMonth(-1)">‹</button>
      <div class="cal-popup-title" id="calPopupTitle"></div>
      <button class="cal-nav-btn" onclick="calNavMonth(1)">›</button>
    </div>
    <div class="cal-dow-row">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
    <div class="cal-grid" id="calPopupGrid"></div>
    <div class="cal-popup-footer">
      <span class="cal-count-label" id="calPopupCount">선택 없음</span>
      <div class="cal-footer-btns">
        <button class="cal-btn-clear" onclick="calClearAll()">전체 해제</button>
        <button class="cal-btn-done" onclick="calClose()">완료</button>
      </div>
    </div>
  </div>
</div>

<div class="save-toast" id="toast"></div>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>⚠️ 초기화 확인</h3>
    <p>모든 직원 데이터와 단가 설정이<br>삭제됩니다. 계속하시겠습니까?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeResetModal()">취소</button>
      <button class="btn-confirm" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'slp_salary_v1';
  let rateBasic = 0, rateOT = 0;
  let rows = [], idCounter = 0;

  // ── 초기 로드 ──
  (function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        rateBasic = data.rateBasic || 0;
        rateOT    = data.rateOT    || 0;
        if (rateBasic) document.getElementById('rateBasic').value = rateBasic;
        if (rateOT)    document.getElementById('rateOT').value    = rateOT;
        if (data.rows && data.rows.length > 0) {
          data.rows.forEach(r => {
            const id = idCounter++;
            rows.push({ id, name: r.name||'', overtime: !!r.overtime, eduDates: r.eduDates||'' });
            appendRowDOM(id);
            updateTrigger(id);
          });
          checkMobileBtn();
          return;
        }
      } catch(e) {}
    }
    addRow();
  })();

  // ── 저장 ──
  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      rateBasic, rateOT,
      rows: rows.map(r => ({ name: r.name, overtime: r.overtime, eduDates: r.eduDates }))
    }));
    showToast('✅ 저장되었습니다');
  }

  // ── 초기화 ──
  function openResetModal()  { document.getElementById('resetModal').classList.add('show'); }
  function closeResetModal() { document.getElementById('resetModal').classList.remove('show'); }
  function confirmReset() {
    closeResetModal();
    localStorage.removeItem(STORAGE_KEY);
    rows = []; idCounter = 0; rateBasic = 0; rateOT = 0;
    document.getElementById('rateBasic').value = '';
    document.getElementById('rateOT').value = '';
    document.getElementById('tableBody').innerHTML = '';
    document.getElementById('mobileList').innerHTML = '';
    addRow();
    showToast('🗑 초기화되었습니다');
  }

  // ── 엑셀 내보내기 ──
  function exportExcel() {
    const now = new Date();
    const ym  = `${now.getFullYear()}년 ${now.getMonth()+1}월`;
    // 이름 있는 행만 필터링
    const validRows = rows.filter(r => r.name && r.name.trim() !== '');
    let csv = '\uFEFF';
    csv += `월급 계산서 (${ym})\n\n기본 단가,${rateBasic}원\n플타 단가,${rateOT}원\n\n`;
    csv += `이름,플타,교육날짜,교육횟수,적용단가,최종금액\n`;
    validRows.forEach(r => {
      const count = countEdu(r.eduDates), rate = r.overtime ? rateOT : rateBasic;
      // 교육날짜를 쌍따옴표로 감싸서 쉼표가 있어도 한 셀에 표시
      const datesCell = r.eduDates ? `"${r.eduDates}"` : '–';
      csv += `${r.name},${r.overtime?'플타':'기본'},${datesCell},${count}회,${rate}원,${count*rate}원\n`;
    });
    const totalAll = validRows.reduce((s,r)=>s+calcRow(r),0);
    const eduAll   = validRows.reduce((s,r)=>s+countEdu(r.eduDates),0);
    csv += `\n합계,,,${eduAll}회,,${totalAll}원\n`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download = `월급계산서_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}.csv`;
    a.click();
    showToast('📊 엑셀 파일로 내보냈습니다');
  }

  // ── 토스트 ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── 단가 입력 ──
  function onRateInput(type, val) {
    const num = parseInt(val.replace(/[^0-9]/g,''),10)||0;
    if (type==='basic') rateBasic=num; else rateOT=num;
    refreshAllResults();
  }

  // ── 행 추가 ──
  function addRow() {
    const id = idCounter++;
    rows.push({ id, name:'', overtime:false, eduDates:'' });
    appendRowDOM(id);
    setTimeout(()=>{ const el=document.getElementById('name-'+id); if(el)el.focus(); },30);
  }

  function appendRowDOM(id) {
    // PC 테이블
    const tbody = document.getElementById('tableBody');
    const tr = document.createElement('tr');
    tr.id = 'row-'+id;
    tr.innerHTML = buildRowHTML(id);
    tbody.appendChild(tr);
    // 모바일 카드
    const ml = document.getElementById('mobileList');
    const mc = document.createElement('div');
    mc.id = 'mcard-'+id;
    mc.className = 'mobile-card';
    mc.innerHTML = buildMobileCardHTML(id);
    ml.appendChild(mc);
    checkMobileBtn();
    calcTotal();
  }

  function checkMobileBtn() {
    document.getElementById('mobileAddBtn').style.display = window.innerWidth <= 680 ? 'block' : 'none';
  }
  window.addEventListener('resize', checkMobileBtn);

  // ── PC 행 HTML ──
  function buildRowHTML(id) {
    const row = rows.find(r=>r.id===id);
    const count = countEdu(row.eduDates);
    const rate  = row.overtime ? rateOT : rateBasic;
    const total = calcRow(row);
    const rateClass   = !rate ? 'none' : row.overtime ? 'ot' : 'basic';
    const resultClass = total>0 ? (row.overtime?'ot-value':'has-value') : '';
    return `
      <td><input class="input-name" id="name-${id}" type="text" placeholder="이름" value="${esc(row.name)}" oninput="updateField(${id},'name',this.value)" /></td>
      <td>
        <div class="seg-wrap">
          <button class="seg-btn ${!row.overtime?'active-basic':''}" onclick="setOvertime(${id},false)">기본</button>
          <button class="seg-btn ${row.overtime?'active-ot':''}"    onclick="setOvertime(${id},true)">플타</button>
        </div>
      </td>
      <td>
        <div class="edu-cell">
          <div class="edu-trigger" onclick="openCalPopup(${id})" id="trigger-${id}">
            <div class="edu-trigger-inner">
              <span class="edu-trigger-text ${count>0?'has-days':''}" id="trigtext-${id}">${count>0?count+'일 선택됨':'날짜 선택'}</span>
              <span class="edu-trigger-dates" id="trigdates-${id}">${count>0?row.eduDates:''}</span>
            </div>
            <span class="edu-trigger-icon">📅</span>
          </div>
        </div>
      </td>
      <td class="applied-rate ${rateClass}" id="rate-${id}">${rate?'₩'+fmt(rate)+'/회':'–'}</td>
      <td class="result-cell ${resultClass}" id="result-${id}">${total>0?'₩'+fmt(total):'–'}</td>
      <td><button class="btn-del" onclick="removeRow(${id})" title="삭제">✕</button></td>`;
  }

  // ── 모바일 카드 HTML ──
  function buildMobileCardHTML(id) {
    const row = rows.find(r=>r.id===id);
    const count = countEdu(row.eduDates);
    const rate  = row.overtime ? rateOT : rateBasic;
    const total = calcRow(row);
    const rateClass   = !rate ? '' : row.overtime ? 'ot' : 'basic';
    const resultClass = total>0 ? (row.overtime?'ot-value':'has-value') : '';
    return `
      <div class="mobile-card-top">
        <input class="mobile-name-input" id="mname-${id}" type="text" placeholder="이름 입력" value="${esc(row.name)}" oninput="updateField(${id},'name',this.value)" />
        <button class="btn-del" onclick="removeRow(${id})">✕</button>
      </div>
      <div class="mobile-card-body">
        <div class="mobile-plta-row">
          <div class="seg-wrap" style="flex:1">
            <button class="seg-btn ${!row.overtime?'active-basic':''}" onclick="setOvertime(${id},false)" id="mseg-basic-${id}">기본</button>
            <button class="seg-btn ${row.overtime?'active-ot':''}"    onclick="setOvertime(${id},true)"  id="mseg-ot-${id}">플타</button>
          </div>
          <div class="mobile-plta-right">
            <span class="mobile-plta-rate-label">적용 단가</span>
            <div class="mobile-rate ${rateClass}" id="mrate-${id}">${rate?'₩'+fmt(rate)+'/회':'–'}</div>
          </div>
        </div>
        <div class="mobile-field" style="grid-column:1/-1">
          <label>교육 날짜</label>
          <div class="edu-trigger" onclick="openCalPopup(${id})" id="mtrigger-${id}">
            <div class="edu-trigger-inner">
              <span class="edu-trigger-text ${count>0?'has-days':''}" id="mtrigtext-${id}">${count>0?count+'일 선택됨':'날짜 선택'}</span>
              <span class="edu-trigger-dates" id="mtrigdates-${id}">${count>0?row.eduDates:''}</span>
            </div>
            <span class="edu-trigger-icon">📅</span>
          </div>
        </div>
        <div class="mobile-field" style="grid-column:1/-1">
          <label>최종 금액</label>
          <div class="mobile-result ${resultClass}" id="mresult-${id}">${total>0?'₩ '+fmt(total):'–'}</div>
        </div>
      </div>`;
  }

  // ══════════════════════════════════════
  //  팝업 달력 상태
  // ══════════════════════════════════════
  let calActiveId   = null;   // 현재 열린 행 id
  let calYear       = 0;      // 팝업에 표시 중인 연도
  let calMonth      = 0;      // 팝업에 표시 중인 월 (0-indexed)
  let calSelected   = new Set(); // 선택된 날짜(일) 집합

  function getSelectedDays(str) {
    const set = new Set();
    if (!str || !str.trim()) return set;
    str.split(',').map(s=>parseInt(s.trim(),10)).filter(n=>n>=1&&n<=31).forEach(n=>set.add(n));
    return set;
  }
  function daysToString(set) { return [...set].sort((a,b)=>a-b).join(', '); }

  const KOR_MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const today = new Date();

  function openCalPopup(id) {
    calActiveId = id;
    const row = rows.find(r=>r.id===id);
    calSelected = getSelectedDays(row.eduDates);
    // 현재 날짜 기준으로 연/월 초기화
    calYear  = today.getFullYear();
    calMonth = today.getMonth();
    renderCalPopup();
    document.getElementById('calPopupOverlay').classList.add('show');
  }

  function calClose() {
    // 선택 결과를 행에 저장
    if (calActiveId !== null) {
      const row = rows.find(r=>r.id===calActiveId);
      if (row) {
        row.eduDates = daysToString(calSelected);
        updateTrigger(calActiveId);
        updateResultCell(calActiveId);
        calcTotal();
      }
    }
    document.getElementById('calPopupOverlay').classList.remove('show');
    calActiveId = null;
  }

  function calOverlayClick(e) {
    if (e.target === document.getElementById('calPopupOverlay')) calClose();
  }

  function calNavMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    renderCalPopup();
  }

  function renderCalPopup() {
    // 헤더 제목
    document.getElementById('calPopupTitle').innerHTML =
      `<span>${calYear}년</span> ${KOR_MONTHS[calMonth]}`;

    // 해당 월의 일 수 및 시작 요일
    const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=일
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

    const grid = document.getElementById('calPopupGrid');
    grid.innerHTML = '';

    // 빈 셀 (월 시작 전)
    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-day empty';
      grid.appendChild(blank);
    }

    // 날짜 셀
    for (let d = 1; d <= daysInMonth; d++) {
      const btn = document.createElement('button');
      btn.className = 'cal-day' + (calSelected.has(d) ? ' selected' : '');
      // 오늘 표시
      if (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear()) {
        btn.classList.add('today');
      }
      btn.textContent = d;
      btn.onclick = () => calToggleDay(d);
      grid.appendChild(btn);
    }

    // 하단 카운트
    updateCalFooter();
  }

  function calToggleDay(d) {
    if (calSelected.has(d)) calSelected.delete(d); else calSelected.add(d);
    // 버튼 클래스 토글
    const grid = document.getElementById('calPopupGrid');
    grid.querySelectorAll('.cal-day:not(.empty)').forEach(btn => {
      const day = parseInt(btn.textContent, 10);
      btn.classList.toggle('selected', calSelected.has(day));
    });
    updateCalFooter();
  }

  function calClearAll() {
    calSelected.clear();
    document.getElementById('calPopupGrid').querySelectorAll('.cal-day').forEach(btn => {
      btn.classList.remove('selected');
    });
    updateCalFooter();
  }

  function updateCalFooter() {
    const el = document.getElementById('calPopupCount');
    const cnt = calSelected.size;
    if (cnt === 0) { el.textContent = '선택 없음'; el.className = 'cal-count-label empty'; }
    else { el.textContent = `${cnt}일 선택됨 (${cnt}회)`; el.className = 'cal-count-label'; }
  }

  // 트리거 버튼 텍스트 갱신
  function updateTrigger(id) {
    const row = rows.find(r=>r.id===id);
    const cnt = countEdu(row.eduDates);
    const txt = cnt > 0 ? cnt+'일 선택됨' : '날짜 선택';
    const cls = 'edu-trigger-text' + (cnt > 0 ? ' has-days' : '');
    ['trigtext-'+id, 'mtrigtext-'+id].forEach(elId => {
      const el = document.getElementById(elId); if(!el) return;
      el.textContent = txt; el.className = cls;
    });
    // 날짜 목록 서브텍스트 갱신
    const datesTxt = cnt > 0 ? row.eduDates : '';
    ['trigdates-'+id, 'mtrigdates-'+id].forEach(elId => {
      const el = document.getElementById(elId); if(!el) return;
      el.textContent = datesTxt;
    });
  }

  // ── 플타/기본 세그먼트 탭 ──
  function setOvertime(id, value) {
    const row = rows.find(r=>r.id===id); if(!row) return;
    row.overtime = value;
    // PC 탭 갱신
    const pcRow = document.getElementById('row-'+id);
    if (pcRow) {
      pcRow.querySelectorAll('.seg-btn').forEach(btn => {
        btn.className = 'seg-btn';
        if (btn.textContent==='기본' && !value) btn.classList.add('active-basic');
        if (btn.textContent==='플타'  &&  value) btn.classList.add('active-ot');
      });
    }
    // 모바일 탭 갱신
    const mb = document.getElementById('mseg-basic-'+id);
    const mo = document.getElementById('mseg-ot-'+id);
    if (mb) mb.className = 'seg-btn' + (!value ? ' active-basic' : '');
    if (mo) mo.className = 'seg-btn' + ( value ? ' active-ot'    : '');
    updateRateCell(id);
    updateResultCell(id); calcTotal();
  }

  // ── 필드 업데이트 ──
  function updateField(id, field, value) {
    const row = rows.find(r=>r.id===id); if(!row) return;
    row[field] = value;
    if(field==='name') {
      const pc=document.getElementById('name-'+id), mb=document.getElementById('mname-'+id);
      if(pc&&document.activeElement!==pc) pc.value=value;
      if(mb&&document.activeElement!==mb) mb.value=value;
      checkDuplicateNames();
    }
    updateResultCell(id); calcTotal();
  }

  function updateRateCell(id) {
    const row=rows.find(r=>r.id===id);
    const rate=row.overtime?rateOT:rateBasic;
    const rc=!rate?'none':row.overtime?'ot':'basic';
    const txt=rate?'₩'+fmt(rate)+'/회':'–';
    const el=document.getElementById('rate-'+id); if(el){el.className='applied-rate '+rc;el.textContent=txt;}
    const mel=document.getElementById('mrate-'+id); if(mel){mel.className='mobile-rate '+rc;mel.textContent=txt;}
  }

  function updateResultCell(id) {
    const row=rows.find(r=>r.id===id);
    const total=calcRow(row);
    const rc=total>0?(row.overtime?'ot-value':'has-value'):'';
    const el=document.getElementById('result-'+id);
    if(el){el.className='result-cell '+rc;el.textContent=total>0?'₩'+fmt(total):'–';}
    const mel=document.getElementById('mresult-'+id);
    if(mel){mel.className='mobile-result '+rc;mel.textContent=total>0?'₩ '+fmt(total):'–';}
    updateRateCell(id);
  }

  function refreshAllResults() { rows.forEach(r=>updateResultCell(r.id)); calcTotal(); }

  function removeRow(id) {
    rows=rows.filter(r=>r.id!==id);
    const tr=document.getElementById('row-'+id); if(tr)tr.remove();
    const mc=document.getElementById('mcard-'+id); if(mc)mc.remove();
    calcTotal();
  }

  // ── 중복 이름 체크 ──
  function checkDuplicateNames() {
    const nameCount = {};
    rows.forEach(r => {
      const n = r.name.trim();
      if (n) nameCount[n] = (nameCount[n]||0) + 1;
    });
    rows.forEach(r => {
      const n = r.name.trim();
      const isDup = n && nameCount[n] > 1;
      const pc = document.getElementById('name-'+r.id);
      const mb = document.getElementById('mname-'+r.id);
      if (pc) pc.classList.toggle('dup', isDup);
      if (mb) mb.classList.toggle('dup', isDup);
    });
  }

  function countEdu(str) { return getSelectedDays(str).size; }
  function calcRow(row) { return countEdu(row.eduDates)*(row.overtime?rateOT:rateBasic); }
  function calcTotal() {
    const total=rows.reduce((s,r)=>s+calcRow(r),0);
    document.getElementById('totalDisplay').textContent=fmt(total);
    // 이름 있는 행만, 중복 이름 제외해서 고유 인원 수 계산
    const uniqueNames = new Set(rows.map(r=>r.name.trim()).filter(n=>n!==''));
    document.getElementById('empCount').textContent=uniqueNames.size;
    document.getElementById('otCount').textContent=rows.filter(r=>r.overtime).length;
    document.getElementById('eduTotal').textContent=rows.reduce((s,r)=>s+countEdu(r.eduDates),0);
  }
  function fmt(n){return(n||0).toLocaleString('ko-KR');}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  document.getElementById('resetModal').addEventListener('click',function(e){if(e.target===this)closeResetModal();});
</script>
</body>
</html>
