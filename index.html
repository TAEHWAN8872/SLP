<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월급 계산기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6fb; --surface: #ffffff; --surface2: #eef0f7;
      --border: #dde1ee; --accent: #6c63ff; --accent-light: #5a52e0;
      --green: #179e68; --text: #1e2133; --muted: #8a8fa8;
      --danger: #e03e3e; --yellow: #b38a00; --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; padding: 40px 16px 80px; }

    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent-light); }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.92rem; }

    /* 툴바 */
    .toolbar {
      max-width: 980px; margin: 0 auto 14px;
      display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap;
    }
    .btn-tool {
      display: flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 0.84rem; font-weight: 600;
      padding: 8px 16px; border-radius: 7px; cursor: pointer;
      border: 1px solid var(--border); transition: all 0.15s;
    }
    .btn-tool.save   { background: rgba(108,99,255,0.12); color: var(--accent-light); border-color: rgba(108,99,255,0.35); }
    .btn-tool.save:hover { background: rgba(108,99,255,0.22); }
    .btn-tool.excel  { background: rgba(62,207,142,0.12); color: var(--green); border-color: rgba(62,207,142,0.35); }
    .btn-tool.excel:hover { background: rgba(62,207,142,0.22); }
    .btn-tool.reset  { background: rgba(255,107,107,0.08); color: var(--danger); border-color: rgba(255,107,107,0.3); }
    .btn-tool.reset:hover { background: rgba(255,107,107,0.18); }

    /* 저장 상태 알림 */
    .save-toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.88rem; padding: 10px 20px;
      border-radius: 30px; opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; white-space: nowrap; z-index: 999;
    }
    .save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 단가 패널 */
    .rate-panel {
      max-width: 980px; margin: 0 auto 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 24px;
      display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    }
    .rate-panel .panel-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; white-space: nowrap; }
    .rate-group { display: flex; align-items: center; gap: 10px; }
    .rate-label { font-size: 0.88rem; color: var(--muted); white-space: nowrap; }
    .rate-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
    .rate-badge.basic { background: rgba(62,207,142,0.15); color: var(--green); }
    .rate-badge.ot    { background: rgba(139,133,255,0.15); color: var(--accent-light); }
    .rate-input-wrap {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 12px; transition: border-color 0.2s;
    }
    .rate-input-wrap:focus-within { border-color: var(--accent-light); }
    .rate-input-wrap span { color: var(--muted); font-size: 0.85rem; }
    .rate-input { background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 0.95rem; font-weight: 600; width: 110px; text-align: right; outline: none; }
    .rate-input::placeholder { color: var(--muted); font-weight: 400; }
    .rate-unit { font-size: 0.78rem; color: var(--muted); margin-left: 2px; }

    /* 카드/테이블 */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; max-width: 980px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: var(--surface2); padding: 12px 14px; font-size: 0.77rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(108,99,255,0.04); }
    td { padding: 11px 14px; vertical-align: middle; }

    .input-name { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.95rem; padding: 4px 0; width: 100%; outline: none; transition: border-color 0.2s; }
    .input-name:focus { border-color: var(--accent-light); }
    .input-name::placeholder { color: var(--muted); }

    td.center { text-align: center; }
    .toggle { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    .toggle input[type="checkbox"] { display: none; }
    .toggle-pill { width: 40px; height: 22px; background: var(--border); border-radius: 999px; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .toggle-pill::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
    .toggle input:checked + .toggle-pill { background: var(--accent); }
    .toggle input:checked + .toggle-pill::after { transform: translateX(18px); }
    .toggle-label { font-size: 0.78rem; color: var(--muted); min-width: 26px; }
    .toggle input:checked ~ .toggle-label { color: var(--accent-light); font-weight: 600; }

    .edu-cell { display: flex; align-items: center; gap: 8px; }
    .input-edu { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.93rem; padding: 4px 0; width: 200px; outline: none; transition: border-color 0.2s; }
    .input-edu:focus { border-color: var(--yellow); }
    .input-edu::placeholder { color: var(--muted); }
    .edu-count-badge { background: rgba(245,200,66,0.12); color: var(--yellow); font-size: 0.78rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; min-width: 36px; text-align: center; }
    .edu-count-badge.empty { background: transparent; color: transparent; }

    .applied-rate { font-size: 0.82rem; white-space: nowrap; text-align: right; }
    .applied-rate.basic { color: var(--green); }
    .applied-rate.ot    { color: var(--accent-light); }
    .applied-rate.none  { color: var(--muted); }

    .result-cell { text-align: right; font-weight: 700; font-size: 0.98rem; color: var(--text); white-space: nowrap; }
    .result-cell.has-value { color: var(--green); }
    .result-cell.ot-value  { color: var(--accent-light); }

    .btn-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    .btn-del:hover { color: var(--danger); background: rgba(255,107,107,0.1); }

    .add-row-wrap { padding: 13px 14px; border-top: 1px solid var(--border); }
    .btn-add { background: none; border: 1px dashed var(--border); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.88rem; padding: 7px 14px; border-radius: 6px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-add:hover { border-color: var(--accent); color: var(--accent-light); background: rgba(108,99,255,0.06); }

    /* 합계 */
    .summary { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); max-width: 980px; margin: 16px auto 0; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .summary-left .label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
    .summary-left .sub { font-size: 0.88rem; color: var(--muted); margin-top: 4px; }
    .summary-left .sub span { color: var(--text); font-weight: 600; }
    .total-amount { font-size: 2rem; font-weight: 700; color: var(--green); letter-spacing: -1px; }
    .total-amount sup { font-size: 1rem; font-weight: 600; margin-right: 3px; vertical-align: super; }

    /* 확인 모달 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; max-width: 340px; width: 90%; text-align: center; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .modal p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
    .modal-btns .btn-cancel { background: var(--surface2); color: var(--muted); }
    .modal-btns .btn-cancel:hover { color: var(--text); }
    .modal-btns .btn-confirm { background: rgba(255,107,107,0.15); color: var(--danger); border-color: rgba(255,107,107,0.3); }
    .modal-btns .btn-confirm:hover { background: rgba(255,107,107,0.28); }

    @media (max-width: 700px) {
      header h1 { font-size: 1.5rem; }
      td { padding: 8px 8px; }
      .input-edu { width: 130px; }
      .rate-panel { gap: 16px; padding: 14px 16px; }
      .toolbar { justify-content: stretch; }
      .btn-tool { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <h1>💰 월급 <span>계산기</span></h1>
  <p>상단에 단가를 설정하고, 직원별로 플타 여부와 교육 날짜를 입력하세요</p>
</header>

<!-- 툴바 -->
<div class="toolbar">
  <button class="btn-tool save"  onclick="saveData()">💾 저장</button>
  <button class="btn-tool excel" onclick="exportExcel()">📊 엑셀 내보내기</button>
  <button class="btn-tool reset" onclick="openResetModal()">🗑 초기화</button>
</div>

<!-- 단가 패널 -->
<div class="rate-panel">
  <div class="panel-title">단가 설정</div>
  <div class="rate-group">
    <div class="rate-label"><span class="rate-badge basic">기본</span>기본 단가 (회당)</div>
    <div class="rate-input-wrap">
      <span>₩</span>
      <input class="rate-input" id="rateBasic" type="text" inputmode="numeric" placeholder="0" oninput="onRateInput('basic', this.value)" />
      <span class="rate-unit">/ 회</span>
    </div>
  </div>
  <div class="rate-group">
    <div class="rate-label"><span class="rate-badge ot">플타</span>플타 단가 (회당)</div>
    <div class="rate-input-wrap">
      <span>₩</span>
      <input class="rate-input" id="rateOT" type="text" inputmode="numeric" placeholder="0" oninput="onRateInput('ot', this.value)" />
      <span class="rate-unit">/ 회</span>
    </div>
  </div>
</div>

<!-- 테이블 -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th style="width:16%">이름</th>
        <th style="width:10%; text-align:center">플타</th>
        <th style="width:40%">교육 날짜 <span style="font-weight:400;opacity:.6">(쉼표로 구분 · 예: 1, 4, 7)</span></th>
        <th style="width:14%; text-align:right">적용 단가</th>
        <th style="width:15%; text-align:right">최종 금액</th>
        <th style="width:5%"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="add-row-wrap">
    <button class="btn-add" onclick="addRow()">＋ 직원 추가</button>
  </div>
</div>

<!-- 합계 -->
<div class="summary">
  <div class="summary-left">
    <div class="label">총 합계</div>
    <div class="sub">직원 <span id="empCount">0</span>명 · 플타 <span id="otCount">0</span>명 · 총 교육 <span id="eduTotal">0</span>회</div>
  </div>
  <div class="total-amount"><sup>₩</sup><span id="totalDisplay">0</span></div>
</div>

<!-- 토스트 -->
<div class="save-toast" id="toast"></div>

<!-- 초기화 확인 모달 -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>⚠️ 초기화 확인</h3>
    <p>모든 직원 데이터와 단가 설정이<br>삭제됩니다. 계속하시겠습니까?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeResetModal()">취소</button>
      <button class="btn-confirm" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'slp_salary_v1';
  let rateBasic = 0, rateOT = 0;
  let rows = [], idCounter = 0;

  // ── 초기 로드 ──
  (function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        rateBasic = data.rateBasic || 0;
        rateOT    = data.rateOT    || 0;
        document.getElementById('rateBasic').value = rateBasic || '';
        document.getElementById('rateOT').value    = rateOT    || '';
        if (data.rows && data.rows.length > 0) {
          data.rows.forEach(r => {
            const id = idCounter++;
            rows.push({ id, name: r.name || '', overtime: !!r.overtime, eduDates: r.eduDates || '' });
            appendRowDOM(id);
          });
          return;
        }
      } catch(e) {}
    }
    // 저장 데이터 없으면 빈 3행
    addRow(); addRow(); addRow();
  })();

  // ── 저장 ──
  function saveData() {
    const data = {
      rateBasic, rateOT,
      rows: rows.map(r => ({ name: r.name, overtime: r.overtime, eduDates: r.eduDates }))
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showToast('✅ 저장되었습니다');
  }

  // ── 초기화 ──
  function openResetModal()  { document.getElementById('resetModal').classList.add('show'); }
  function closeResetModal() { document.getElementById('resetModal').classList.remove('show'); }
  function confirmReset() {
    closeResetModal();
    localStorage.removeItem(STORAGE_KEY);
    rows = []; idCounter = 0;
    rateBasic = 0; rateOT = 0;
    document.getElementById('rateBasic').value = '';
    document.getElementById('rateOT').value = '';
    document.getElementById('tableBody').innerHTML = '';
    addRow(); addRow(); addRow();
    showToast('🗑 초기화되었습니다');
  }

  // ── 엑셀 내보내기 (CSV → .xlsx 대신 탭 구분 .xls) ──
  function exportExcel() {
    const now = new Date();
    const ym  = `${now.getFullYear()}년 ${now.getMonth()+1}월`;
    let csv = '\uFEFF'; // BOM (한글 깨짐 방지)
    csv += `월급 계산서 (${ym})\n\n`;
    csv += `기본 단가,${rateBasic}원\n`;
    csv += `플타 단가,${rateOT}원\n\n`;
    csv += `이름,플타,교육날짜,교육횟수,적용단가,최종금액\n`;

    rows.forEach(r => {
      const count = countEdu(r.eduDates);
      const rate  = r.overtime ? rateOT : rateBasic;
      const total = count * rate;
      csv += `${r.name},${r.overtime ? '플타' : '기본'},${r.eduDates},${count}회,${rate}원,${total}원\n`;
    });

    const totalAll  = rows.reduce((s, r) => s + calcRow(r), 0);
    const eduAll    = rows.reduce((s, r) => s + countEdu(r.eduDates), 0);
    csv += `\n합계,,,${ eduAll }회,,${totalAll}원\n`;

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `월급계산서_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📊 엑셀 파일로 내보냈습니다');
  }

  // ── 토스트 ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── 단가 입력 ──
  function onRateInput(type, val) {
    const num = parseInt(val.replace(/[^0-9]/g, '') || '0', 10) || 0;
    if (type === 'basic') rateBasic = num;
    else rateOT = num;
    refreshAllResults();
  }

  // ── 행 추가 ──
  function addRow() {
    const id = idCounter++;
    rows.push({ id, name: '', overtime: false, eduDates: '' });
    appendRowDOM(id);
    setTimeout(() => { const el = document.getElementById('name-' + id); if (el) el.focus(); }, 30);
  }

  function appendRowDOM(id) {
    const tbody = document.getElementById('tableBody');
    const tr = document.createElement('tr');
    tr.id = 'row-' + id;
    tr.innerHTML = buildRowHTML(id);
    tbody.appendChild(tr);
    calcTotal();
  }

  function buildRowHTML(id) {
    const row = rows.find(r => r.id === id);
    const count = countEdu(row.eduDates);
    const rate  = row.overtime ? rateOT : rateBasic;
    const total = calcRow(row);
    const rateClass   = !rate ? 'none' : row.overtime ? 'ot' : 'basic';
    const resultClass = total > 0 ? (row.overtime ? 'ot-value' : 'has-value') : '';
    return `
      <td><input class="input-name" id="name-${id}" type="text" placeholder="이름" value="${esc(row.name)}" oninput="updateField(${id},'name',this.value)" /></td>
      <td class="center">
        <label class="toggle">
          <input type="checkbox" id="ot-${id}" ${row.overtime ? 'checked' : ''} onchange="updateField(${id},'overtime',this.checked)" />
          <span class="toggle-pill"></span>
          <span class="toggle-label" id="otlabel-${id}">${row.overtime ? 'ON' : 'OFF'}</span>
        </label>
      </td>
      <td>
        <div class="edu-cell">
          <input class="input-edu" id="edu-${id}" type="text" placeholder="예) 1, 4, 7" value="${esc(row.eduDates)}" oninput="updateEdu(${id}, this.value)" />
          <span class="edu-count-badge ${count > 0 ? '' : 'empty'}" id="badge-${id}">${count > 0 ? count+'회' : '0회'}</span>
        </div>
      </td>
      <td class="applied-rate ${rateClass}" id="rate-${id}">${rate ? '₩ '+fmt(rate)+' / 회' : '–'}</td>
      <td class="result-cell ${resultClass}" id="result-${id}">${total > 0 ? '₩ '+fmt(total) : '–'}</td>
      <td><button class="btn-del" onclick="removeRow(${id})" title="삭제">✕</button></td>`;
  }

  function updateEdu(id, value) {
    const row = rows.find(r => r.id === id);
    if (!row) return;
    row.eduDates = value;
    const count = countEdu(value);
    const badge = document.getElementById('badge-' + id);
    if (badge) { badge.textContent = count+'회'; badge.className = 'edu-count-badge' + (count > 0 ? '' : ' empty'); }
    updateResultCell(id);
    calcTotal();
  }

  function updateField(id, field, value) {
    const row = rows.find(r => r.id === id);
    if (!row) return;
    row[field] = value;
    if (field === 'overtime') {
      const lbl = document.getElementById('otlabel-' + id);
      if (lbl) lbl.textContent = value ? 'ON' : 'OFF';
      updateRateCell(id);
    }
    updateResultCell(id);
    calcTotal();
  }

  function updateRateCell(id) {
    const row = rows.find(r => r.id === id);
    const rate = row.overtime ? rateOT : rateBasic;
    const rateClass = !rate ? 'none' : row.overtime ? 'ot' : 'basic';
    const el = document.getElementById('rate-' + id);
    if (el) { el.className = 'applied-rate ' + rateClass; el.textContent = rate ? '₩ '+fmt(rate)+' / 회' : '–'; }
  }

  function updateResultCell(id) {
    const row = rows.find(r => r.id === id);
    const total = calcRow(row);
    const resultClass = total > 0 ? (row.overtime ? 'ot-value' : 'has-value') : '';
    const el = document.getElementById('result-' + id);
    if (el) { el.className = 'result-cell ' + resultClass; el.textContent = total > 0 ? '₩ '+fmt(total) : '–'; }
    updateRateCell(id);
  }

  function refreshAllResults() { rows.forEach(r => updateResultCell(r.id)); calcTotal(); }

  function removeRow(id) {
    rows = rows.filter(r => r.id !== id);
    const tr = document.getElementById('row-' + id);
    if (tr) tr.remove();
    calcTotal();
  }

  function countEdu(str) {
    if (!str || !str.trim()) return 0;
    return str.split(',').map(s => s.trim()).filter(s => s !== '').length;
  }

  function calcRow(row) {
    return countEdu(row.eduDates) * (row.overtime ? rateOT : rateBasic);
  }

  function calcTotal() {
    const total    = rows.reduce((s, r) => s + calcRow(r), 0);
    const otCount  = rows.filter(r => r.overtime).length;
    const eduTotal = rows.reduce((s, r) => s + countEdu(r.eduDates), 0);
    document.getElementById('totalDisplay').textContent = fmt(total);
    document.getElementById('empCount').textContent = rows.length;
    document.getElementById('otCount').textContent  = otCount;
    document.getElementById('eduTotal').textContent = eduTotal;
  }

  function fmt(n) { return (n||0).toLocaleString('ko-KR'); }
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // 모달 외부 클릭 닫기
  document.getElementById('resetModal').addEventListener('click', function(e) {
    if (e.target === this) closeResetModal();
  });
</script>
</body>
</html>
